<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header>
      <h1>{{ page.title }}</h1>
      <p><small>Posted on {{ page.date | date: "%B %d, %Y" }}</small></p>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <p>&copy; {{ site.title }} {{ site.time | date: "%Y" }}</p>
    </footer>
  </body>
</html>
